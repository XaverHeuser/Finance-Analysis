name: Build and Deploy Cloud Run Job

on:
  push:
    branches:
      - main

# Define environment variables
env:
  PROJECT_ID: finance-analysis-id
  REGION: europe-west1
  REPOSITORY: finance-analysis-repo
  IMAGE_NAME: finance-analysis-image
  JOB_NAME: finance-analysis-job
  WIF_PROVIDER: "projects/18888783623/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider"
  SA_EMAIL: "github-actions-deployer@finance-analysis-id.iam.gserviceaccount.com"


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Request the OIDC token from GitHub
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

        # Authenticate to GCP using the Workload Identity Federation setup in Terraform
      - name: Authenticate to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      # Install Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      
      # Log directly into Docker using the generated OIDC access token
      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      
      # Build Docker image tagged for Artifact Registry
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest .

      # Push Docker image to Artifact Registry
      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }} --all-tags

      # Update Cloud Run Job using the newly built image
      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update ${{ env.JOB_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }}
